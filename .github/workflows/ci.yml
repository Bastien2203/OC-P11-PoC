name: CI Pipeline - Medhead

on: 
  push:
    branches:
      - '**'

jobs:
  backend-tests:
    name: Backend - Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: run tests
        working-directory: ./emergency-bed-service
        run: chmod +x gradlew && ./gradlew test

  stress-tests:
    name: Backend - Stress Tests
    needs: backend-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: build compose stack
        run: |
          docker compose up -d --build
          sleep 15

      - name: install jmeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz

      - name: run jmeter
        working-directory: ./emergency-bed-service
        run: |
          ../apache-jmeter-5.6.3/bin/jmeter -n -t stress-test-plan.jmx -l stress-results.jtl -e -o stress-report-web

      - name: upload jmeter report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-report
          path: emergency-bed-service/stress-report-web/

  e2e-tests:
    name: Frontend - E2E Playwright
    needs: backend-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: build compose stack
        run: |
          docker compose up -d --build
          sleep 15

      - name: install npm dependancies
        working-directory: ./front-end
        run: npm i

      - name: install playwright browsers
        working-directory: ./front-end
        run: npx playwright install --with-deps


      - name: exec e2e test with playwright
        working-directory: ./front-end
        run: npx playwright test

      - name: upload e2e test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: front-end/playwright-report/
          retention-days: 7