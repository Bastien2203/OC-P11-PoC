name: CI Pipeline - Medhead

on: push

jobs:
  backend-tests:
    name: Backend - build and tests
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: java config
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: exec spring boot tests
        working-directory: ./emergency-bed-service
        run: chmod +x gradlew && ./gradlew test

      - name: build .jar
        working-directory: ./emergency-bed-service
        run: ./gradlew assemble

      - name: upload .jar file
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-jar
          path: emergency-bed-service/build/libs/*.jar
          retention-days: 1


  stress-tests:
    name: Backend - Stress Tests
    needs: backend-tests
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: java config
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: download .jar file
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-jar
          path: emergency-bed-service/build/libs/

      - name: install jmeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          
      - name: run spring boot
        working-directory: ./emergency-bed-service/build/libs
        run: |
          nohup java -jar $(ls *.jar | head -n 1) > spring.log 2>&1 &
          echo "Waiting spring boot start..."
          sleep 15

      - name: run jmeter
        working-directory: ./emergency-bed-service
        run: |
          ../apache-jmeter-5.6.3/bin/jmeter -n -t stress-test-plan.jmx -l stress-results.jtl -e -o stress-report-web

      - name: upload jmeter report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-report
          path: emergency-bed-service/stress-report-web/


  e2e-tests:
    name: Frontend - E2E Playwright
    needs: backend-tests
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: java config
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: node.js config
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ./front-end/package-lock.json

      - name: download .jar file
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-jar
          path: emergency-bed-service/build/libs/

      - name: run spring boot
        working-directory: ./emergency-bed-service/build/libs
        run: |
          nohup java -jar $(ls *.jar | head -n 1) > spring.log 2>&1 &
          sleep 15

      - name: install npm dependancies
        working-directory: ./front-end
        run: npm i

      - name: install playwright browsers
        working-directory: ./front-end
        run: npx playwright install --with-deps

      - name: run vite server
        working-directory: ./front-end
        run: |
          nohup npm run dev > vite.log 2>&1 &
          sleep 5

      - name: exec e2e test with playwright
        working-directory: ./front-end
        run: npx playwright test

      - name: upload e2e test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: front-end/playwright-report/
          retention-days: 7